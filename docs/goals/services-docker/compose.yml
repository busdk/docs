name: bus-services-single-image-goal

services:
  bus-services:
    image: ${BUS_SERVICES_IMAGE:-ghcr.io/busdk/bus-services-ubuntu:dev}
    entrypoint:
      - /usr/local/bin/bus-services-entrypoint.sh
    stop_signal: SIGTERM
    stop_grace_period: 60s
    init: false
    environment:
      BUS_EVENTS_JWT_SECRET: ${BUS_EVENTS_JWT_SECRET:-not-a-secret-goal-fixture-hs256-key}
      BUS_CONFIG_DIR: /etc/bus/config
      BUS_SERVICES_BUS_DIR: /var/lib/bus
      BUS_SERVICES_CONTAINER: "1"
      BUS_SERVICES_LOG_DIR: /var/log/bus
      BUS_SERVICES_STATE_DIR: /var/lib/bus/services
    volumes:
      - bus-services-runtime:/var/lib/bus
      - bus-services-run:/run/bus
      - bus-services-logs:/var/log/bus
    tmpfs:
      - /tmp
      - /run/postgresql
    ports:
      - "127.0.0.1:${BUS_SERVICES_HTTP_PORT:-8080}:8080"
      - "127.0.0.1:${BUS_SERVICES_EVENTS_PORT:-8081}:8081"
      - "127.0.0.1:${BUS_SERVICES_API_PORT:-8090}:8090"
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/bus
        - services
        - ps
        - --file
        - /opt/bus/services.yml
        - --profile-dir
        - /opt/bus/profiles
        - --state-dir
        - /var/lib/bus/services
        - --format
        - json
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  bus-services-runtime:
  bus-services-run:
  bus-services-logs:
